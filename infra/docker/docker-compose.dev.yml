name: meet-or-solo-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: meet-or-solo-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
      PGTZ: ${PGTZ:-Asia/Seoul}
    volumes:
      - ../../data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"
    networks:
      - meet-or-solo-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: eclipse-temurin:17-jre-jammy
    container_name: meet-or-solo-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: ["java", "-jar", "/app/app.jar"]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SERVER_PORT: ${SERVER_PORT}
      TZ: ${TZ:-Asia/Seoul}
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Seoul"
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRES_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: ${JWT_REFRESH_TOKEN_EXPIRES_DAYS}
    volumes:
      - ../../backend/app.jar:/app/app.jar:ro
      - ../../logs/backend:/app/logs
    expose:
      - "8080"
    networks:
      - meet-or-solo-dev

  nginx:
    image: nginx:1.27-alpine
    container_name: meet-or-solo-nginx-dev
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "18080:80"
    volumes:
      - ../../frontend/dist:/usr/share/nginx/html:ro
      - ../nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../logs/nginx:/var/log/nginx
    networks:
      - meet-or-solo-dev

networks:
  meet-or-solo-dev:
    name: meet-or-solo-dev
