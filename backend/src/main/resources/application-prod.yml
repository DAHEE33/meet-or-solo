spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    root: info

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL}
  auth:
    cookie-secure: ${AUTH_COOKIE_SECURE:true}
  profile:
    encryption-key: ${PROFILE_ENCRYPTION_KEY}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  oauth:
    kakao:
      client-id: ${KAKAO_CLIENT_ID}
      client-secret: ${KAKAO_CLIENT_SECRET}
      redirect-uri: ${KAKAO_REDIRECT_URI}
  jwt:
    secret: ${JWT_SECRET}
    access-token-expires-minutes: ${JWT_ACCESS_TOKEN_EXPIRES_MINUTES:30}
    refresh-token-expires-days: ${JWT_REFRESH_TOKEN_EXPIRES_DAYS:14}
