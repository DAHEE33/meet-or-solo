spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:meet_or_solo_local}
    username: ${POSTGRES_USER:meet_user}
    password: ${POSTGRES_PASSWORD:meet_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    org.hibernate.SQL: debug

app:
  object-storage:
    endpoint: ${OCI_OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
    region: ${OCI_OBJECT_STORAGE_REGION:us-ashburn-1}
    access-key: ${OCI_OBJECT_STORAGE_ACCESS_KEY:LOCAL_PLACEHOLDER_ACCESS_KEY}
    secret-key: ${OCI_OBJECT_STORAGE_SECRET_KEY:LOCAL_PLACEHOLDER_SECRET_KEY}
    bucket: ${OCI_OBJECT_STORAGE_BUCKET:meet-or-solo-assets}
    profile-prefix: ${OCI_OBJECT_STORAGE_PROFILE_PREFIX:profiles/local}
    max-file-size: ${PROFILE_IMAGE_MAX_SIZE:5MB}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  auth:
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
  profile:
    encryption-key: ${PROFILE_ENCRYPTION_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/kakao/callback}
    naver:
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:8080/api/auth/naver/callback}
      authorization-uri: ${NAVER_AUTHORIZATION_URI:https://nid.naver.com/oauth2.0/authorize}
      token-uri: ${NAVER_TOKEN_URI:https://nid.naver.com/oauth2.0/token}
      user-info-uri: ${NAVER_USER_INFO_URI:https://openapi.naver.com/v1/nid/me}
      connect-timeout: ${NAVER_CONNECT_TIMEOUT:3s}
      read-timeout: ${NAVER_READ_TIMEOUT:5s}
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expires-minutes: ${JWT_ACCESS_TOKEN_EXPIRES_MINUTES:30}
    refresh-token-expires-minutes: ${JWT_REFRESH_TOKEN_EXPIRES_MINUTES:30}

