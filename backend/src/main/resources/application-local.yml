spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:meet_or_solo_local}
    username: ${POSTGRES_USER:meet_user}
    password: ${POSTGRES_PASSWORD:meet_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    org.hibernate.SQL: debug

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  auth:
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
  profile:
    encryption-key: ${PROFILE_ENCRYPTION_KEY:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth:
    kakao:
      client-id: ${KAKAO_CLIENT_ID:}
      client-secret: ${KAKAO_CLIENT_SECRET:}
      redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/auth/kakao/callback}
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expires-minutes: ${JWT_ACCESS_TOKEN_EXPIRES_MINUTES:30}
    refresh-token-expires-days: ${JWT_REFRESH_TOKEN_EXPIRES_DAYS:14}

