spring:
  application:
    name: meet-or-solo-backend
  profiles:
    default: local
  datasource:
    hikari:
      connection-init-sql: SET TIME ZONE 'Asia/Seoul'
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
      write-dates-with-context-time-zone: true

server:
  port: ${SERVER_PORT:8080}
