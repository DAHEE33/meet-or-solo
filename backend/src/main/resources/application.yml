spring:
  application:
    name: meet-or-solo-backend
  profiles:
    default: local
  datasource:
    hikari:
      connection-init-sql: SET TIME ZONE 'Asia/Seoul'
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
      write-dates-with-context-time-zone: true
  servlet:
    multipart:
      max-file-size: ${PROFILE_IMAGE_MAX_SIZE:5MB}
      max-request-size: ${PROFILE_IMAGE_MAX_SIZE:5MB}

server:
  port: ${SERVER_PORT:8080}

app:
  matching:
    scheduler:
      enabled: ${MATCHING_SCHEDULER_ENABLED:false}
      fixed-delay: ${MATCHING_SCHEDULER_FIXED_DELAY:5s}
      stale-timeout: ${MATCHING_STALE_TIMEOUT:30s}
      proposal-timeout: ${MATCHING_PROPOSAL_TIMEOUT:30s}
      batch-size: ${MATCHING_SCHEDULER_BATCH_SIZE:20}
